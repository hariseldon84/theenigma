<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enigma — Capture</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #050505;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; color: #fff; }
    .mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #333;
    }
    .mode-toggle button {
      padding: 0.5rem 1rem;
      border: none;
      background: #1a1a1a;
      color: #888;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .mode-toggle button.active { background: #0078d4; color: #fff; }
    .mode-toggle button:not(.active):hover { background: #252525; color: #ccc; }
    .mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 120, 212, 0.2);
      color: #0078d4;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .mic-btn:hover { background: rgba(0, 120, 212, 0.35); }
    .mic-btn:active { transform: scale(0.96); }
    .mic-btn.recording {
      background: rgba(220, 53, 69, 0.4);
      color: #fff;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.85; } }
    .mic-btn svg { width: 36px; height: 36px; }
    .status {
      margin-top: 1.5rem;
      min-height: 2rem;
      font-size: 0.9rem;
      text-align: center;
      max-width: 320px;
    }
    .status.success { color: #0f0; }
    .status.error { color: #f66; }
    .status.hint { color: #888; }
  </style>
</head>
<body>
  <h1>Capture</h1>
  <div class="mode-toggle" role="group" aria-label="Capture type">
    <button type="button" id="mode-commitment" class="active">Commitment</button>
    <button type="button" id="mode-people">People context</button>
    <button type="button" id="mode-thought">Thought</button>
  </div>
  <button type="button" class="mic-btn" id="mic" title="Click to start, click again to stop" aria-label="Record">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
      <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
    </svg>
  </button>
  <p class="status hint" id="status">Click mic to start recording, click again to send</p>

  <script>
    (function () {
      var originalFetch = window.fetch;
      window.fetch = function (url, opts) {
        var u = typeof url === 'string' ? url : (url && url.url);
        var requestOpts = opts;
        if (u && u.indexOf('/api/') !== -1) {
          var token = localStorage.getItem('enigma_access_token');
          requestOpts = requestOpts || {};
          requestOpts.headers = requestOpts.headers || {};
          if (token) requestOpts.headers['Authorization'] = 'Bearer ' + token;
        }
        return originalFetch.call(this, url, requestOpts).then(function (res) {
          if (res.status === 401 && u && u.indexOf('/api/') !== -1) {
            localStorage.removeItem('enigma_access_token');
            localStorage.removeItem('enigma_refresh_token');
            window.location.href = '/login';
          }
          return res;
        });
      };
      originalFetch('/api/auth/config').then(function (r) { return r.json(); }).then(function (c) {
        if (c.authRequired && !localStorage.getItem('enigma_access_token')) {
          window.location.href = '/login';
          return;
        }
        runCapture();
      }).catch(function () { runCapture(); });
      function runCapture() {
    (function () {
      const mic = document.getElementById('mic');
      const status = document.getElementById('status');
      const modeCommitment = document.getElementById('mode-commitment');
      const modePeople = document.getElementById('mode-people');
      const modeThought = document.getElementById('mode-thought');
      let captureType = 'commitment';
      let mediaRecorder = null;
      let chunks = [];
      function setActiveMode(active) {
        modeCommitment.classList.toggle('active', active === 'commitment');
        modePeople.classList.toggle('active', active === 'people_context');
        if (modeThought) modeThought.classList.toggle('active', active === 'thought');
      }
      modeCommitment.addEventListener('click', function () { captureType = 'commitment'; setActiveMode('commitment'); });
      modePeople.addEventListener('click', function () { captureType = 'people_context'; setActiveMode('people_context'); });
      if (modeThought) modeThought.addEventListener('click', function () { captureType = 'thought'; setActiveMode('thought'); });

      function setStatus(msg, type) {
        status.textContent = msg;
        status.className = 'status ' + (type || 'hint');
      }

      function stopAndSend() {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
        mediaRecorder.stop();
      }

      async function maybeSaveThoughtToCloset(result) {
        if (!result || result.tag !== 'thought') return false;
        var save = window.confirm('Act now or save this thought to Grandma\'s Closet?\n\nClick OK to save for later.');
        if (!save) return false;
        const res = await fetch('/api/grandmas-closet/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: result.content || result.preview || '',
            context: "Grandma's Closet (from Thought)"
          }),
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          throw new Error(data.detail || 'Could not save to Grandma\'s Closet');
        }
        return true;
      }

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          chunks = [];
          mediaRecorder.ondataavailable = function (e) { if (e.data.size) chunks.push(e.data); };
          mediaRecorder.onstop = async function () {
            stream.getTracks().forEach(function (t) { t.stop(); });
            if (chunks.length === 0) {
              setStatus('No audio recorded', 'error');
              return;
            }
            const blob = new Blob(chunks, { type: 'audio/webm' });
            setStatus('Sending…', 'hint');
            try {
              const form = new FormData();
              form.append('audio', blob, 'audio.webm');
              form.append('type', captureType);
              const res = await fetch('/api/commitment', { method: 'POST', body: form });
              const data = await res.json().catch(function () { return {}; });
              if (res.ok) {
                var tag = data.tag ? ' [' + data.tag + ']' : '';
                setStatus('Saved to Nexus' + tag + ': "' + (data.preview || '').slice(0, 35) + '…"', 'success');
                try {
                  const saved = await maybeSaveThoughtToCloset(data);
                  if (saved) setStatus('Thought saved to Grandma\'s Closet for later.', 'success');
                } catch (e) {
                  setStatus('Thought captured, but Closet save failed: ' + e.message, 'error');
                }
              } else {
                var detail = data.detail;
                if (Array.isArray(detail) && detail.length) detail = detail[0].msg || detail[0];
                setStatus(detail || 'Upload failed', 'error');
              }
            } catch (e) {
              setStatus('Request failed: ' + e.message, 'error');
            }
          };
          mediaRecorder.start();
          mic.classList.add('recording');
          setStatus('Recording… Click again to stop and send', 'hint');
        } catch (e) {
          setStatus('Microphone access denied or unavailable', 'error');
        }
      }

      mic.addEventListener('click', function () {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mic.classList.remove('recording');
          stopAndSend();
        } else {
          startRecording();
        }
      });
    })();
      }
    })();
  </script>
</body>
</html>
